<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#0A0A0A"/>

  <!-- Left temple -->
  <line x1="3" y1="15" x2="0" y2="12" stroke="#F5F5F0" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Right temple -->
  <line x1="29" y1="15" x2="32" y2="12" stroke="#F5F5F0" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Left lens -->
  <rect x="2" y="11" width="12" height="9" rx="3.5" fill="none" stroke="#F5F5F0" stroke-width="2.2"/>
  <!-- Right lens -->
  <rect x="18" y="11" width="12" height="9" rx="3.5" fill="none" stroke="#F5F5F0" stroke-width="2.2"/>

  <!-- Bridge (arches upward between lenses) -->
  <path d="M14 15.5 Q16 12.5 18 15.5" fill="none" stroke="#F5F5F0" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Detection ping in right lens — crosshair dot -->
  <circle cx="24" cy="15.5" r="1.3" fill="#F5F5F0"/>
  <circle cx="24" cy="15.5" r="3" fill="none" stroke="#F5F5F0" stroke-width="0.8" opacity="0.5"/>
</svg>
